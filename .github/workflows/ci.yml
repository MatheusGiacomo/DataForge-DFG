# .github/workflows/ci.yml
# Executa testes e linter a cada push e pull request.

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Testes — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Configura Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Linter (ruff)
        run: ruff check src/ tests/

      - name: Testes com cobertura
        run: pytest tests/ --cov=dfg --cov-report=xml --cov-report=term-missing

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: "Verifica build do pacote"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala build tools
        run: pip install build twine

      - name: Constrói o pacote
        run: python -m build

      - name: Verifica integridade do pacote (twine check)
        run: twine check dist/*
